<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supersurf Browser</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f0f14;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* BOX */
.box{
  width:90%;
  max-width:650px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

/* LOGO */
.logo{
  font-size:65px;
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  font-size:16px;
  outline:none;
}

/* BUTTON */
button{
  margin-top:10px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  background:#ff2d75;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* HISTORY */
.historyBox{
  margin-top:20px;
  text-align:left;
  max-height:200px;
  overflow:auto;
}

.item{
  padding:8px;
  margin:5px 0;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  cursor:pointer;
}

.item:hover{
  background:rgba(255,255,255,0.15);
}

.small{
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}

</style>
</head>

<body>

<div class="box">

  <!-- LOGO -->
  <div class="logo">
    <span style="color:#4285F4;">S</span>
    <span style="color:#EA4335;">u</span>
    <span style="color:#FBBC05;">p</span>
    <span style="color:#34A853;">e</span>
    <span style="color:#4285F4;">r</span>
    <span style="color:#EA4335;">s</span>
    <span style="color:#FBBC05;">u</span>
    <span style="color:#34A853;">r</span>
    <span style="color:#4285F4;">f</span>
  </div>

  <!-- SEARCH -->
  <input id="q" placeholder="Suche oder URL eingeben">
  <button onclick="go()">Suchen</button>

  <button onclick="showHistory()">Verlauf anzeigen</button>

  <div class="historyBox" id="historyBox"></div>

  <div class="small">Supersurf Browser • mit Verlauf</div>

</div>

<script>

let history = JSON.parse(localStorage.getItem("history")) || [];

/* SPEICHERN */
function saveToHistory(text){
  history.unshift(text);
  if(history.length > 20) history.pop();
  localStorage.setItem("history", JSON.stringify(history));
}

/* SUCHE */
function go(){

  let q = document.getElementById("q").value.trim();
  if(!q) return;

  saveToHistory(q);

  if(q.includes(".") && !q.includes(" ")){
    if(!q.startsWith("http")){
      q = "https://" + q;
    }
    window.location.href = q;
  } else {
    window.location.href =
      "https://duckduckgo.com/?q=" + encodeURIComponent(q);
  }
}

/* VERLAUF ANZEIGEN */
function showHistory(){

  let box = document.getElementById("historyBox");
  box.innerHTML = "";

  if(history.length === 0){
    box.innerHTML = "Kein Verlauf vorhanden.";
    return;
  }

  history.forEach(item => {

    let div = document.createElement("div");
    div.className = "item";
    div.innerText = item;

    div.onclick = () => {
      document.getElementById("q").value = item;
    };

    box.appendChild(div);
  });
}

</script>

</body>
</html>
